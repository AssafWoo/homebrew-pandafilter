name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: ccr-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: ccr-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: ccr-linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p ccr

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/ccr ${{ matrix.asset_name }}

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true

  update-formula:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update formula
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/AssafWoo/homebrew-ccr/archive/refs/tags/${TAG}.tar.gz"

          # Download to file — piping curl to sha256sum gives wrong hash on partial downloads
          for i in $(seq 1 5); do
            curl -fsSL "$URL" -o /tmp/ccr-release.tar.gz && break
            echo "Download attempt $i failed, retrying..."
            sleep 5
          done

          # Validate — a real tarball is at least 100 KB
          SIZE=$(stat -c%s /tmp/ccr-release.tar.gz 2>/dev/null || echo 0)
          if [ "$SIZE" -lt 102400 ]; then
            echo "ERROR: tarball is only ${SIZE} bytes — download likely failed"
            exit 1
          fi

          SHA256=$(sha256sum /tmp/ccr-release.tar.gz | awk '{print $1}')
          echo "URL:    $URL"
          echo "SHA256: $SHA256"

          # Update only the top-level url and sha256 lines (2-space indent).
          # Resource sha256 lines (6-space indent) are left untouched.
          sed -i \
            -e "s|^  url \".*homebrew-ccr.*\"|  url \"$URL\"|" \
            -e "s|^  sha256 \"[a-f0-9]*\"|  sha256 \"$SHA256\"|" \
            Formula/ccr.rb

          echo "--- Formula after update ---"
          head -6 Formula/ccr.rb

      - name: Commit and push formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ccr.rb
          git diff --cached --quiet && echo "No formula changes" && exit 0
          git commit -m "chore: update formula SHA256 for ${TAG}"
          git push origin HEAD:main
